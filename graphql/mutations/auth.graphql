extend type Mutation {

    register(
        username: String!
            @rules(apply: [
                "required",
                "string",
                "max:255",
                "unique:users,username"
            ])

        email: String!
            @rules(apply: [
                "required",
                "email",
                "unique:users,email"
            ])

        password: String!
            @rules(apply: [
                "required",
                "min:8"
            ])
    ): RegisterResponse
        @field(resolver: "App\\GraphQL\\Mutations\\AuthMutation@register")

    login(
        username: String!,
        password: String!
    ): AuthPayload
        @field(resolver: "App\\GraphQL\\Mutations\\AuthMutation@login")

    logout: Boolean
        @field(resolver: "App\\GraphQL\\Mutations\\AuthMutation@logout")
        @guard(with: ["api"])
}